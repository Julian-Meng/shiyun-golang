# 诗云 / Poetry Cloud — static deploy (NO backend). Serve the Vite `dist/` build.
# Brotli/gzip for app assets; RAW (uncompressed) poems/*.json so HTTP Range works (per-poet fetch).
#
#   npm run build          # → dist/ (tsc + vite); copies public/data into dist/data
#   npm run precompress    # → .br/.gz next to text assets (skips data/poems — see below)
#   rsync -a dist/ user@host:/var/www/shiyun/dist/
#
# Requires the nginx brotli module (ngx_brotli) for brotli_static; gzip_static is built-in.

server {
  listen 443 ssl http2;
  server_name shiyun.example.com;
  root /var/www/shiyun/dist;

  # ssl_certificate     /etc/letsencrypt/live/shiyun.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/shiyun.example.com/privkey.pem;

  brotli_static on;   # serve a precompressed file.br when the client accepts brotli
  gzip_static on;     # else file.gz
  gzip on;            # else compress on the fly
  gzip_types application/json application/javascript text/css image/svg+xml;
  charset utf-8;

  # SPA: 诗云 is a hash-router (#a=… / #p=…), so every path just serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── 动态 OG 分享卡 (OPTIONAL — see docs/DEPLOY.md §6) ──────────────────────────────────────────
  # Hash links (#a=…) are invisible to crawlers, so permalink.ts MIRRORS the target into the query
  # (/?a=… / /?p=…). Route ONLY `/` WITH `?a=` or `?p=` to the node backend, which returns index.html
  # with per-target OG/Twitter meta. Everything else (and `/` with no a/p) stays 100% static, so a
  # deploy WITHOUT this block — or with the backend down — behaves EXACTLY like today.
  #   • proxy_pass WITHOUT a URI part is the `if`-safe form (no rewrite surprises in a location-if).
  #   • requires the feedback-server.mjs unit started with Environment=SITE_ROOT=/var/www/shiyun/dist.
  location = / {
    if ($arg_a) { proxy_pass http://127.0.0.1:8787; }
    if ($arg_p) { proxy_pass http://127.0.0.1:8787; }
    proxy_set_header Host $host;
    try_files /index.html =404;   # no a/p (and no proxy) → serve the static index.html
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  # content-hashed bundles → cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ── Per-poet Range fetch (egress saver) ─────────────────────────────────────
  # poems/{bucket}.json MUST be served RAW: the byte offsets in poems/{bucket}.idx.json index the
  # UNCOMPRESSED file, so `Range: bytes=off-end` must return exactly those bytes (status 206).
  # Disable compression here (a compressed Range would slice the wrong bytes; the client then falls
  # back to the whole bucket — correct but no saving). Range is on by default in nginx.
  location /data/poems/ {
    brotli_static off;
    gzip_static off;
    gzip off;
    add_header Accept-Ranges bytes;
    add_header Cache-Control "public, max-age=86400";
  }
  # lines/ + the small jsons are fetched whole → compress them normally (big win on lines/, ~791 MB raw).
  location /data/ {
    add_header Cache-Control "public, max-age=86400";
  }
}
