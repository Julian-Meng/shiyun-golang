# 诗云 / Poetry Cloud — static deploy (NO backend). Serve the Vite `dist/` build.
# Brotli/gzip for app assets; RAW (uncompressed) poems/*.json so HTTP Range works (per-poet fetch).
#
#   npm run build          # → dist/ (tsc + vite); copies public/data into dist/data
#   npm run precompress    # → .br/.gz next to text assets (skips data/poems — see below)
#   rsync -a dist/ user@host:/var/www/shiyun/dist/
#
# Requires the nginx brotli module (ngx_brotli) for brotli_static; gzip_static is built-in.

server {
  listen 443 ssl http2;
  server_name shiyun.example.com;
  root /var/www/shiyun/dist;

  # ssl_certificate     /etc/letsencrypt/live/shiyun.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/shiyun.example.com/privkey.pem;

  brotli_static on;   # serve a precompressed file.br when the client accepts brotli
  gzip_static on;     # else file.gz
  gzip on;            # else compress on the fly
  gzip_types application/json application/javascript text/css image/svg+xml;
  charset utf-8;

  # SPA: 诗云 is a hash-router (#a=… / #p=…), so every path just serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── 动态 OG 分享卡 (OPTIONAL — see docs/DEPLOY.md §6) ──────────────────────────────────────────
  # Hash links (#a=…) are invisible to crawlers, so permalink.ts MIRRORS the target into the query
  # (/?a=… / /?p=…). Route ONLY `/` WITH `?a=` or `?p=` to the node backend, which returns index.html
  # with per-target OG/Twitter meta. Everything else (and `/` with no a/p) stays 100% static, so a
  # deploy WITHOUT this block — or with the backend down — behaves EXACTLY like today.
  #   • proxy_pass WITHOUT a URI part is the `if`-safe form (no rewrite surprises in a location-if).
  #   • requires the feedback-server.mjs unit started with Environment=SITE_ROOT=/var/www/shiyun/dist.
  location = / {
    if ($arg_a) { proxy_pass http://127.0.0.1:8787; }
    if ($arg_p) { proxy_pass http://127.0.0.1:8787; }
    proxy_set_header Host $host;
    try_files /index.html =404;   # no a/p (and no proxy) → serve the static index.html
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }
  # content-hashed bundles → cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # ── Per-poet Range fetch (egress saver) ─────────────────────────────────────
  # poems/{bucket}.json MUST be served RAW: the byte offsets in poems/{bucket}.idx.json index the
  # UNCOMPRESSED file, so `Range: bytes=off-end` must return exactly those bytes (status 206).
  # Disable compression here (a compressed Range would slice the wrong bytes; the client then falls
  # back to the whole bucket — correct but no saving). Range is on by default in nginx.
  location /data/poems/ {
    brotli_static off;
    gzip_static off;
    gzip off;
    add_header Accept-Ranges bytes;
    add_header Cache-Control "public, max-age=86400";
  }
  # ── linesf/ short-circuit — keep EXPECTED 404s out of the access log (operational, not optional) ────
  # linesf/ is the ~4.4 GB delete-1 fuzzy index. If you DON'T deploy it (common — it's a search fallback
  # and load.ts no-ops on 404), the client still probes many linesf/{bucket}.json per fuzzy query, all
  # 404. Two reasons to short-circuit them here: (1) a log-mining auto-blocklist will read that burst of
  # 404s as a "404-flood scanner" and ban the REAL visitor — this caused a full-site 403 outage on
  # 2026-06-13; (2) they're needless disk stat()s + (behind a CDN) origin pulls. `return 404` keeps the
  # client's graceful-degrade path identical; `access_log off` keeps them out of any security log-miner.
  # If you DO deploy linesf/, delete this block so the shards are served normally.
  location ^~ /data/linesf/ {
    access_log off;
    return 404;
  }
  # lines/ + the small jsons are fetched whole → compress them normally (big win on lines/, ~791 MB raw).
  location /data/ {
    add_header Cache-Control "public, max-age=86400";
  }

  # ── OPTIONAL: versioned, IMMUTABLE data path (see docs/DEPLOY.md §2.1) ────────────────────────────
  # The shards above revalidate daily (max-age=86400) because /data/ is a STABLE path — a data bump
  # reuses the same URLs, so we can't promise immutability. The fix: build with VITE_DATA_BASE=/data/v2
  # (the load.ts knob, batch B2) so the client fetches /data/v2/… instead, and serve those URLs from the
  # SAME files on disk with `immutable, max-age=31536000`. A future data bump → /data/v3 + a new sibling
  # pair below; the old /data/v2 caches die naturally (their URLs are simply never requested again).
  #
  # These are TWO SIBLING prefix locations with explicit `alias` paths (NOT nested locations — alias +
  # nested location is order-dependent and easy to get wrong). `^~` makes each an exact-prefix match that
  # beats any regex location, and nginx prefers the LONGER prefix, so /data/v2/poems/* always lands in the
  # poems block and everything else under /data/v2/ in the second. CRITICAL: the poems block must
  # replicate the /data/poems/ Range gotcha (§3) — RAW (no gzip/brotli) + Accept-Ranges, or the byte
  # offsets slice a compressed stream and the per-poet Range fetch silently degrades to whole-bucket.
  #
  # Point both aliases at the SAME dist/data dir you already serve (no disk restructuring). The trailing
  # slashes must line up: `location ^~ /data/v2/poems/ { alias <…>/data/poems/; }` maps
  # /data/v2/poems/00.json → <…>/data/poems/00.json.
  #
  # location ^~ /data/v2/poems/ {
  #   alias /var/www/shiyun/dist/data/poems/;   # ← same files as /data/poems/, served immutable
  #   brotli_static off;
  #   gzip_static off;
  #   gzip off;
  #   add_header Accept-Ranges bytes;
  #   add_header Cache-Control "public, max-age=31536000, immutable";
  # }
  # location ^~ /data/v2/ {
  #   alias /var/www/shiyun/dist/data/;         # lines/ + small jsons — compress normally, cache forever
  #   add_header Cache-Control "public, max-age=31536000, immutable";
  # }
}
